<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中化學講義素材整合工作站_V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://3dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #2ecc71; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid #ecf0f1; padding-bottom: 15px; }
        
        /* 頁籤設計 */
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #ccc; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: bold; color: #7f8c8d; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab:hover { color: var(--secondary); }
        .tab.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 介面元素 */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"], textarea { flex: 1; padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; font-size: 16px; }
        textarea { height: 120px; resize: vertical; }
        button { padding: 12px 24px; background-color: var(--secondary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #27ae60; }

        /* 面板與結果區 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #ecf0f1; border-radius: 8px; padding: 15px; background: #fafafa; }
        .card h3 { margin-top: 0; color: var(--primary); text-align: center; font-size: 18px; }
        
        #chemImage { max-width: 100%; height: auto; display: none; margin: 0 auto; border-radius: 4px; }
        #viewer_3D { width: 100%; height: 250px; position: relative; background: #fff; border: 1px inset #ccc; display: none; border-radius: 4px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #f2f2f2; width: 35%; color: var(--primary); }
        
        .status { margin-top: 10px; font-weight: bold; color: #e74c3c; line-height: 1.5; }
        .loading-text { color: #f39c12; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔬 高中化學講義素材整合工作站_V2</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('single')">深度探索 (2D/3D/性質)</div>
        <div class="tab" onclick="switchTab('batch')">批量生成 (講義打包)</div>
    </div>

    <div id="single" class="tab-content active">
        <div class="input-group">
            <input type="text" id="chemName" placeholder="輸入中文或英文化學名稱 (如: 葡萄糖, 阿斯匹靈)..." onkeypress="if(event.key === 'Enter') searchSingle()">
            <button id="searchBtn" onclick="searchSingle()">解析與生成</button>
        </div>
        <div id="singleStatus" class="status"></div>

        <div class="dashboard" id="dashboardArea" style="display: none;">
            <div class="card">
                <h3>2D 結構圖</h3>
                <img id="chemImage" alt="2D結構">
                <div style="text-align: center; margin-top: 15px;">
                    <button class="btn-success" onclick="download2D()">下載 2D 圖片</button>
                </div>
            </div>
            
            <div class="card">
                <h3>3D 立體互動模型</h3>
                <div id="viewer_3D"></div>
                <p style="font-size: 12px; text-align: center; color: #666; margin-top: 8px;">*可使用滑鼠拖曳旋轉、滾輪縮放</p>
            </div>

            <div class="card" style="grid-column: span 2;">
                <h3>核心化學性質 (講義資料)</h3>
                <table id="propTable">
                    <tr><th>解析學名 (Search Query)</th><td id="td_queryname" style="color: #2980b9; font-weight: bold;">-</td></tr>
                    <tr><th>國際命名 (IUPAC)</th><td id="td_iupac">-</td></tr>
                    <tr><th>分子式 (Formula)</th><td id="td_formula">-</td></tr>
                    <tr><th>分子量 (Weight)</th><td id="td_weight">-</td></tr>
                    <tr><th>SMILES 代碼</th><td id="td_smiles" style="word-break: break-all; font-family: monospace;">-</td></tr>
                </table>
            </div>
        </div>
    </div>

    <div id="batch" class="tab-content">
        <p style="color: #555;">請輸入多個化學物質名稱（支援中文，每行一個），系統將自動為您抓取 2D 去背圖片並打包成 ZIP 檔。</p>
        <textarea id="batchInput" placeholder="例如：&#10;阿斯匹靈&#10;葡萄糖&#10;Benzene"></textarea>
        <div style="text-align: right; margin-top: 10px;">
            <button id="batchBtn" class="btn-success" onclick="startBatch()">開始批量打包下載</button>
        </div>
        <div id="batchStatus" class="status" style="color: var(--primary);"></div>
    </div>
</div>

<script>
    const PUBCHEM_API = "https://pubchem.ncbi.nlm.nih.gov/rest/pug";
    // 已確認加入 redirects=1 參數處理跳轉
    const WIKI_API = "https://zh.wikipedia.org/w/api.php?action=query&prop=langlinks&lllang=en&format=json&origin=*&redirects=1&titles=";
    
    let viewer3D = null;
    let currentCid = null;
    let currentName = null;

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    async function translateViaWikipedia(chineseName) {
        try {
            const res = await fetch(WIKI_API + encodeURIComponent(chineseName));
            const data = await res.json();
            const pages = data.query.pages;
            const pageId = Object.keys(pages)[0];
            
            if (pageId !== "-1" && pages[pageId].langlinks) {
                return pages[pageId].langlinks[0]['*'];
            }
            return null;
        } catch (e) {
            return null;
        }
    }

    async function searchPubChemAPI(queryName) {
        try {
            const res = await fetch(`${PUBCHEM_API}/compound/name/${encodeURIComponent(queryName)}/cids/JSON`);
            if (!res.ok) return null;
            const data = await res.json();
            return data.IdentifierList.CID[0];
        } catch (e) { 
            return null; 
        }
    }

    async function smartGetCid(name, statusElementId) {
        const status = document.getElementById(statusElementId);
        
        let cid = await searchPubChemAPI(name);
        if (cid) return { cid: cid, finalName: name };

        if (status) status.innerHTML = `⚠️ 直接查詢無果，正在透過維基百科智能轉譯「<span class="loading-text">${name}</span>」...`;
        
        const engName = await translateViaWikipedia(name);
        if (engName) {
            if (status) status.innerHTML = `✅ 成功轉譯為學名「<span class="loading-text">${engName}</span>」，正在獲取結構...`;
            cid = await searchPubChemAPI(engName);
            if (cid) return { cid: cid, finalName: engName };
        }

        return null;
    }

    async function searchSingle() {
        const name = document.getElementById('chemName').value.trim();
        const status = document.getElementById('singleStatus');
        const dash = document.getElementById('dashboardArea');
        const btn = document.getElementById('searchBtn');

        if (!name) { status.textContent = "請輸入名稱！"; return; }

        status.innerHTML = `🔄 正在連線資料庫查詢「<span class="loading-text">${name}</span>」...`;
        status.style.color = "#333";
        dash.style.display = "none";
        btn.disabled = true;

        const result = await smartGetCid(name, 'singleStatus');
        
        if (!result) {
            status.textContent = `❌ 找不到「${name}」的資料，或無法確認其英文學名。請嘗試輸入化學式或其他常見學名。`;
            status.style.color = "#e74c3c";
            btn.disabled = false;
            return;
        }

        currentCid = result.cid;
        currentName = result.finalName; 

        document.getElementById('td_queryname').textContent = `${name} (解析為: ${currentName})`;

        const img = document.getElementById('chemImage');
        img.src = `${PUBCHEM_API}/compound/cid/${currentCid}/PNG?record_type=2d&image_size=large`;
        img.style.display = "block";

        load3DModel(currentCid);
        fetchProperties(currentCid);

        status.innerHTML = `✅ 解析完成！(CID: ${currentCid})`;
        status.style.color = "#2ecc71";
        dash.style.display = "grid";
        btn.disabled = false;
    }

    async function load3DModel(cid) {
        const viewerDiv = document.getElementById('viewer_3D');
        viewerDiv.style.display = "block";
        if (!viewer3D) {
            viewer3D = $3Dmol.createViewer(viewerDiv, { backgroundColor: 'white' });
        }
        viewer3D.clear();

        try {
            const res = await fetch(`${PUBCHEM_API}/compound/cid/${cid}/record/SDF/?record_type=3d`);
            if (res.ok) {
                const sdfData = await res.text();
                viewer3D.addModel(sdfData, "sdf");
                viewer3D.setStyle({}, { stick: { radius: 0.15 }, sphere: { scale: 0.3 } });
                viewer3D.zoomTo();
                viewer3D.render();
            } else {
                viewerDiv.innerHTML = "<p style='text-align:center; margin-top:100px; color:#95a5a6;'>⚠️ 此分子暫無 3D 座標資料</p>";
            }
        } catch (e) {
            console.error("3D 載入失敗", e);
        }
    }

    async function fetchProperties(cid) {
        try {
            const res = await fetch(`${PUBCHEM_API}/compound/cid/${cid}/property/MolecularFormula,MolecularWeight,CanonicalSMILES,IUPACName/JSON`);
            if (res.ok) {
                const data = await res.json();
                const props = data.PropertyTable.Properties[0];
                document.getElementById('td_iupac').textContent = props.IUPACName || "無";
                document.getElementById('td_formula').textContent = props.MolecularFormula || "無";
                document.getElementById('td_weight').textContent = props.MolecularWeight ? props.MolecularWeight + " g/mol" : "無";
                document.getElementById('td_smiles').textContent = props.CanonicalSMILES || "無";
            }
        } catch (e) {
            console.error("屬性載入失敗", e);
        }
    }

    async function download2D() {
        const imgUrl = document.getElementById('chemImage').src;
        try {
            const res = await fetch(imgUrl);
            const blob = await res.blob();
            saveAs(blob, `${currentName}_2D.png`);
        } catch (e) {
            alert("下載失敗");
        }
    }

    async function startBatch() {
        const inputStr = document.getElementById('batchInput').value.trim();
        const status = document.getElementById('batchStatus');
        const btn = document.getElementById('batchBtn');

        if (!inputStr) { status.textContent = "請輸入至少一個名稱！"; return; }

        const names = inputStr.split('\n').map(n => n.trim()).filter(n => n.length > 0);
        status.innerHTML = `啟動批量處理任務，共計 ${names.length} 個項目...<br>`;
        btn.disabled = true;

        const zip = new JSZip();
        const imgFolder = zip.folder("化學2D結構圖");
        let successCount = 0;

        for (let i = 0; i < names.length; i++) {
            const name = names[i];
            status.innerHTML += `[${i+1}/${names.length}] 正在解析：${name}... `;
            
            const result = await smartGetCid(name, null); 
            
            if (result && result.cid) {
                try {
                    const res = await fetch(`${PUBCHEM_API}/compound/cid/${result.cid}/PNG?record_type=2d&image_size=large`);
                    if (res.ok) {
                        const blob = await res.blob();
                        imgFolder.file(`${name}.png`, blob); 
                        status.innerHTML += `<span style="color:green;">成功 (對應: ${result.finalName})</span><br>`;
                        successCount++;
                    }
                } catch (e) {
                    status.innerHTML += `<span style="color:red;">圖片下載失敗</span><br>`;
                }
            } else {
                status.innerHTML += `<span style="color:red;">找不到此物質</span><br>`;
            }
        }

        status.innerHTML += `<br><b>處理完成！成功 ${successCount}/${names.length} 筆。正在產生 ZIP 壓縮檔...</b>`;

        if (successCount > 0) {
            zip.generateAsync({type:"blob"}).then(function(content) {
                saveAs(content, "高中化學講義素材包_V2.zip");
                status.innerHTML += `<br><span style="color:green;">✅ ZIP 檔案已自動下載！</span>`;
                btn.disabled = false;
            });
        } else {
            status.innerHTML += `<br><span style="color:red;">❌ 無成功項目，未產生 ZIP。</span>`;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
