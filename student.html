<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化學課堂互動 (學生端)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #334155; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; box-sizing: border-box; }
        h1 { color: #3b82f6; text-align: center; margin-top: 0; }
        .quiz-box { background: #f1f5f9; padding: 20px; border-radius: 8px; font-size: 15px; line-height: 1.6; margin-bottom: 20px; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; border: 1px solid #e2e8f0; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #059669; }
        .empty-state { text-align: center; color: #94a3b8; padding: 40px 0; }
    </style>
</head>
<body>

    <div class="container" id="mainApp">
        <h1>📡 化學隨堂測驗</h1>
        
        <div id="noQuiz" class="empty-state">
            <h2>目前沒有測驗</h2>
            <p>請等待老師發布考卷...</p>
            <button style="background:#3b82f6; margin-top:20px;" onclick="location.reload()">重新整理</button>
        </div>

        <div id="hasQuiz" style="display:none;">
            <p style="font-weight:bold;">📝 老師已派發考卷：</p>
            <div class="quiz-box" id="studentQuizContent"></div>
            
            <input type="text" id="studentName" placeholder="請輸入你的姓名或座號...">
            <input type="text" id="studentAns" placeholder="請輸入答案 (例: A B C D)...">
            <button onclick="submitAnswer()">📤 提交考卷</button>
        </div>
    </div>

    <script>
        // 模擬從資料庫 (這裡用 LocalStorage 替代) 讀取老師發布的測驗
        window.onload = function() {
            const quiz = localStorage.getItem('v4_current_quiz');
            if(quiz) {
                document.getElementById('noQuiz').style.display = 'none';
                document.getElementById('hasQuiz').style.display = 'block';
                document.getElementById('studentQuizContent').innerText = quiz;
            }
        }

        function submitAnswer() {
            const name = document.getElementById('studentName').value.trim();
            const ans = document.getElementById('studentAns').value.trim();
            if(!name || !ans) {
                alert("請填寫姓名與答案！");
                return;
            }

            // 寫入資料庫
            let answers = JSON.parse(localStorage.getItem('v4_student_answers') || '[]');
            answers.push({
                name: name,
                answer: ans,
                time: new Date().toLocaleTimeString()
            });
            localStorage.setItem('v4_student_answers', JSON.stringify(answers));

            // 完成畫面
            document.getElementById('mainApp').innerHTML = `
                <h1 style="color:#10b981;">✅ 提交成功！</h1>
                <p style="text-align:center;">你的答案已經傳送給老師，請看教室大螢幕。</p>
            `;
        }
    </script>
</body>
</html>
